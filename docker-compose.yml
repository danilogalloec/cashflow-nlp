services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: cashflow
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: cashflow_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cashflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://cashflow:changeme@db:5432/cashflow_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        API_URL: http://backend:8000
    depends_on:
      - backend
    environment:
      API_URL: http://backend:8000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
